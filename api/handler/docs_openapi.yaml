openapi: 3.1.0
info:
  title: StudBud Backend API
  description: |
    HTTP API for the StudBud study-aid backend.

    **Scope:** only implemented routes are documented. Stub routes (quiz, plan, duel) are omitted until their specs ship.

    **Auth:** most routes require a JWT bearer token. Use `POST /user-register` or `POST /user-login` to obtain one, then click **Authorize** in Swagger UI and paste the token (without the `Bearer ` prefix).

    **Email-verification gate:** routes tagged "auth+verified" reject tokens where `email_verified: false` with HTTP 403 `email_not_verified`. After verifying, re-login to obtain a fresh JWT.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local dev
tags:
  - name: Auth & User
  - name: Subjects
  - name: Chapters
  - name: Flashcards
  - name: Search
  - name: Friendships
  - name: Subscriptions
  - name: Collaboration
  - name: Images
  - name: Preferences
  - name: Gamification
  - name: AI
  - name: Admin
  - name: Billing
  - name: Exams
  - name: RevisionPlan

security:
  - BearerAuth: []

paths:
  /user-register:
    post:
      tags: [Auth & User]
      summary: Register a new user
      description: "Creates an account, issues a verification email, returns a JWT with `email_verified: false`."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '200':
          description: JWT for the new user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /user-login:
    post:
      tags: [Auth & User]
      summary: Log in
      description: Authenticates and returns a JWT reflecting current `email_verified` state.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: JWT
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /verify-email:
    get:
      tags: [Auth & User]
      summary: Verify email
      description: Consumes a one-shot verification token. Re-login after this call to get a new JWT.
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema: { type: object, properties: { message: { type: string } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /images/{id}:
    get:
      tags: [Images]
      summary: Serve image bytes
      description: Streams image content. Public — id is an opaque capability.
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Image bytes
          content:
            image/*: { schema: { type: string, format: binary } }
        '404': { $ref: '#/components/responses/NotFound' }

  /user-test-jwt:
    post:
      tags: [Auth & User]
      summary: Validate JWT
      responses:
        '201': { description: Token valid }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /resend-verification:
    post:
      tags: [Auth & User]
      summary: Resend verification email
      description: Throttled to 1 request / 60 s / user.
      responses:
        '200':
          description: Sent
          content:
            application/json:
              schema: { type: object, properties: { message: { type: string } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /set-profile-picture:
    post:
      tags: [Auth & User]
      summary: Set profile picture (verified)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_id]
              properties:
                image_id: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { type: object, properties: { message: { type: string } } }

  /get-user-stats:
    get:
      tags: [Gamification]
      summary: Aggregate user stats (verified, camelCase)
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AggregateStats' }

  /upload-image:
    post:
      tags: [Images]
      summary: Upload image or annales PDF (verified)
      description: |
        Multipart upload. Default profile: image MIMEs only, 5 MiB form cap, 6 MiB hard cap.
        Pass `purpose=exam_annales` (query string or form field) to upload a past-paper PDF
        for an exam: PDF only, 5 MiB max, 10 pages max.
      parameters:
        - in: query
          name: purpose
          required: false
          description: |
            Upload context. Omit for default image upload. Use `exam_annales` for an exam annales PDF.
          schema:
            type: string
            enum: ["", exam_annales]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                purpose:
                  type: string
                  description: Same as the query-string `purpose`; either form may be used.
                  enum: ["", exam_annales]
      responses:
        '200':
          description: Image id + URL
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Image' }

  /delete-image:
    post:
      tags: [Images]
      summary: Delete image (verified)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /subject-list:
    get:
      tags: [Subjects]
      summary: List owned subjects
      parameters:
        - in: query
          name: archived
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: Subjects
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Subject' } }

  /subject:
    get:
      tags: [Subjects]
      summary: Get a subject
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Subject
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subject' }

  /subject-stats:
    get:
      tags: [Subjects]
      summary: Per-subject card-difficulty distribution
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Per-subject stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubjectStats' }

  /subject-create:
    post:
      tags: [Subjects]
      summary: Create subject (verified)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubjectCreateInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subject' }

  /subject-update:
    post:
      tags: [Subjects]
      summary: Update subject (verified, owner only)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubjectUpdateInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subject' }

  /subject-delete:
    post:
      tags: [Subjects]
      summary: Delete subject (verified, owner only)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /chapter-list:
    get:
      tags: [Chapters]
      summary: List chapters of a subject
      parameters:
        - in: query
          name: subject_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Chapters
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Chapter' } }

  /chapter-stats:
    get:
      tags: [Chapters]
      summary: Per-chapter card-difficulty distribution
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Per-chapter stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterStats' }

  /chapter-create:
    post:
      tags: [Chapters]
      summary: Create chapter (verified, editor+)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, title]
              properties:
                subject_id: { type: integer, format: int64 }
                title: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chapter' }

  /chapter-update:
    post:
      tags: [Chapters]
      summary: Update chapter (verified, editor+)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                position: { type: integer }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Chapter' }

  /chapter-delete:
    post:
      tags: [Chapters]
      summary: Delete chapter (verified, editor+)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /flashcard-list:
    get:
      tags: [Flashcards]
      summary: List flashcards of a subject
      parameters:
        - in: query
          name: subject_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Flashcards
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Flashcard' } }

  /flashcard:
    get:
      tags: [Flashcards]
      summary: Get a flashcard
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Flashcard
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flashcard' }

  /flashcard-create:
    post:
      tags: [Flashcards]
      summary: Create flashcard (verified, editor+)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FlashcardCreateInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flashcard' }

  /flashcard-update:
    post:
      tags: [Flashcards]
      summary: Update flashcard (verified, editor+)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FlashcardUpdateInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flashcard' }

  /flashcard-delete:
    post:
      tags: [Flashcards]
      summary: Delete flashcard (verified, editor+)
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Deleted }

  /flashcard-review:
    post:
      tags: [Flashcards]
      summary: Record a flashcard review result
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [result]
              properties:
                result: { type: integer, enum: [0, 1, 2], description: "0=bad, 1=ok, 2=good" }
      responses:
        '200':
          description: Updated card
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Flashcard' }

  /search/subjects/owned:
    get:
      tags: [Search]
      summary: Search subjects owned by the caller
      description: Paginated search over the caller's own subjects (all visibility levels). Use limit/offset to page; when fewer than limit results come back, the list is exhausted. By default archived subjects are excluded; pass include_archived=true to surface them.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
        - in: query
          name: include_archived
          required: false
          description: When true, archived owned subjects are included in results.
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: One page of hits
          content:
            application/json:
              schema: { type: array, items: { type: object, additionalProperties: true } }

  /search/subjects/public:
    get:
      tags: [Search]
      summary: Discover public subjects authored by other users
      description: Paginated search over subjects with visibility=public owned by someone other than the caller.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: One page of hits
          content:
            application/json:
              schema: { type: array, items: { type: object, additionalProperties: true } }

  /search/users:
    get:
      tags: [Search]
      summary: Search users
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: One page of hits
          content:
            application/json:
              schema: { type: array, items: { type: object, additionalProperties: true } }

  /search/flashcards:
    get:
      tags: [Search]
      summary: Search flashcards in the caller's library
      description: "Case-insensitive substring match over title/question/answer (pg_trgm). Scope is library-only: owner + collaborator + subscribed-public + friend-visible (when caller is an accepted friend of the owner). Random public content is intentionally NOT searched; use /search/subjects/public to discover public subjects, then subscribe to bring them into this search scope. By default archived subjects are excluded; pass include_archived=true to also surface cards from the caller's OWN archived subjects (non-owned archived subjects stay hidden regardless)."
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
        - in: query
          name: include_archived
          required: false
          description: When true, cards from the caller's own archived subjects are included; collaborator/subscribed/friend access still excludes archived.
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: One page of hits
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FlashcardHit' }

  /friendship-request:
    post:
      tags: [Friendships]
      summary: Send friend request (verified)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver_id]
              properties:
                receiver_id: { type: integer, format: int64 }
      responses:
        '201':
          description: Pending friendship
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Friendship' }

  /friendship-accept:
    post:
      tags: [Friendships]
      summary: Accept friend request
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Friendship' }

  /friendship-decline:
    post:
      tags: [Friendships]
      summary: Decline friend request
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Declined
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Friendship' }

  /friendship-unfriend:
    post:
      tags: [Friendships]
      summary: Unfriend
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Unfriended }

  /friendship-list:
    get:
      tags: [Friendships]
      summary: List accepted friendships
      responses:
        '200':
          description: Friendships
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Friendship' } }

  /friendship-pending:
    get:
      tags: [Friendships]
      summary: List pending incoming requests
      responses:
        '200':
          description: Friendships
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Friendship' } }

  /subject-subscribe:
    post:
      tags: [Subscriptions]
      summary: Subscribe to a public subject
      parameters:
        - in: query
          name: subject_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Subscribed }

  /subject-unsubscribe:
    post:
      tags: [Subscriptions]
      summary: Unsubscribe
      parameters:
        - in: query
          name: subject_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Unsubscribed }

  /subject-subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subject IDs I subscribe to
      responses:
        '200':
          description: IDs
          content:
            application/json:
              schema: { type: array, items: { type: integer, format: int64 } }

  /collaborators:
    get:
      tags: [Collaboration]
      summary: List collaborators on a subject
      parameters:
        - in: query
          name: subject_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Collaborators
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Collaborator' } }
    post:
      tags: [Collaboration]
      summary: Add collaborator (verified, owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, user_id, role]
              properties:
                subject_id: { type: integer, format: int64 }
                user_id: { type: integer, format: int64 }
                role: { type: string, enum: [viewer, editor] }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collaborator' }

  /collaborator-remove:
    post:
      tags: [Collaboration]
      summary: Remove collaborator (verified, owner only)
      parameters:
        - in: query
          name: subject_id
          required: true
          schema: { type: integer, format: int64 }
        - in: query
          name: user_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: Removed }

  /collaboration-invites:
    post:
      tags: [Collaboration]
      summary: Create invite link (verified, owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, role]
              properties:
                subject_id: { type: integer, format: int64 }
                role: { type: string, enum: [viewer, editor] }
                ttl_hours: { type: integer, description: "0 or negative means no expiry" }
      responses:
        '201':
          description: Invite
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InviteLink' }

  /collaboration-invite-redeem:
    post:
      tags: [Collaboration]
      summary: Redeem invite link (verified)
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Collaborator row granted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Collaborator' }

  /preferences:
    get:
      tags: [Preferences]
      summary: Get user preferences
      responses:
        '200':
          description: Prefs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Prefs' }

  /preferences-update:
    post:
      tags: [Preferences]
      summary: Update preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ai_planning_enabled: { type: boolean, nullable: true }
                daily_goal_target: { type: integer, nullable: true }
      responses:
        '200':
          description: Updated prefs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Prefs' }

  /gamification-state:
    get:
      tags: [Gamification]
      summary: Streak + daily goal snapshot
      responses:
        '200':
          description: State
          content:
            application/json:
              schema:
                type: object
                properties:
                  streak: { $ref: '#/components/schemas/Streak' }
                  daily_goal: { $ref: '#/components/schemas/DailyGoal' }

  /training-session-record:
    post:
      tags: [Gamification]
      summary: Record a training session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, card_count, duration_ms, score]
              properties:
                subject_id: { type: integer, format: int64 }
                card_count: { type: integer }
                duration_ms: { type: integer }
                score: { type: integer }
      responses:
        '200':
          description: Session + streak + daily goal + newly-awarded badges
          content:
            application/json:
              schema:
                type: object
                properties:
                  session: { $ref: '#/components/schemas/TrainingSession' }
                  streak: { $ref: '#/components/schemas/Streak' }
                  daily_goal: { $ref: '#/components/schemas/DailyGoal' }
                  newly_awarded:
                    type: array
                    items: { $ref: '#/components/schemas/Achievement' }

  /user-stats:
    get:
      tags: [Gamification]
      summary: Gamification-scope stats (snake_case)
      responses:
        '200':
          description: Stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cards: { type: integer }
                  total_sessions: { type: integer }
                  current_streak: { type: integer }
                  longest_streak: { type: integer }

  /achievements:
    get:
      tags: [Gamification]
      summary: List achievements with per-caller unlock state
      responses:
        '200':
          description: Achievements
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Achievement' } }

  /ai/quota:
    get:
      tags: [AI]
      summary: Current AI quota + access
      description: Auth-only (no email-verified gate). Shows today's used/limit for each feature.
      responses:
        '200':
          description: Quota snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuotaSnapshot' }

  /ai/flashcards/prompt:
    post:
      tags: [AI]
      summary: Generate flashcards from a prompt (SSE)
      description: |
        Returns Server-Sent Events. Frames:
          - `event: job\ndata: {"jobId": 1}`
          - `event: chapter\ndata: {"index":0,"title":"..."}` (repeated, only when auto_chapters=true)
          - `event: card\ndata: {"chapterIndex": int|null, "title":...,"question":...,"answer":...}` (repeated)
          - `event: done\ndata: {"ok":true}` OR `event: error\ndata: {"code":...,"message":...}`

        Swagger UI cannot render SSE well — use `curl -N` for the best experience.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromptGenInput' }
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream: { schema: { type: string } }
        '402':
          description: No AI access (comp/subscription required)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Concurrent generation already running
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429':
          description: Daily quota exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /ai/flashcards/pdf:
    post:
      tags: [AI]
      summary: Generate flashcards from PDF (multipart, SSE)
      description: |
        multipart/form-data. Same SSE event shape as `/ai/flashcards/prompt`.

        Two generation modes:
          - `image` (default) rasterizes each page and sends images to the model.
            Hard-capped at 30 pages; over-cap requests return
            `pdf_image_mode_unavailable` so the client can offer text-mode retry.
          - `text` extracts the document text only (via go-fitz) and sends it as
            a single text content block. Used as a fallback when image mode is
            rejected. Capped at 200 pages and 400_000 extracted characters.

        Limits: 20 MB body, 30 s per-page render timeout.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [subject_id, file]
              properties:
                subject_id: { type: integer, format: int64 }
                chapter_id: { type: integer, format: int64, description: "Optional. When set, suppresses auto-chapters." }
                coverage: { type: string, enum: [Core, Balanced, Comprehensive], default: Balanced }
                style: { type: string, enum: [short, standard, detailed], default: standard }
                focus: { type: string }
                auto_chapters: { type: string, enum: ["true", "false"] }
                mode:
                  type: string
                  enum: [image, text]
                  default: image
                  description: |
                    Generation mode. `image` (default) rasterizes pages and sends
                    images to the model. `text` extracts the document text only —
                    used as a fallback when image mode is rejected. The frontend
                    re-submits with `mode=text` after a `pdf_image_mode_unavailable`
                    error.
                file: { type: string, format: binary }
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream: { schema: { type: string } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '402':
          description: No AI access
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '413':
          description: |
            Content too large. Codes: `pdf_too_many_pages` (text mode, > 200 pages),
            `pdf_text_too_long` (text mode, > 400 000 extracted characters).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: |
            Image-mode generation is not viable for this PDF. The client should
            offer the user a text-mode retry by re-submitting with `mode=text`.
            Code: `pdf_image_mode_unavailable`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429':
          description: Daily quota exceeded, or upload exceeds 20 MB (`pdf_too_large`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /ai/check:
    post:
      tags: [AI]
      summary: AI review of a single flashcard (JSON)
      description: Non-streaming. Returns verdict + optional findings + suggested rewrite.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckInput' }
      responses:
        '200':
          description: Check output
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckOutput' }
        '402':
          description: No AI access
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: Provider content-policy refusal
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429':
          description: Quota exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /ai/commit-generation:
    post:
      tags: [AI]
      summary: Persist an edited AI draft (chapters + cards) in one tx
      description: Cards are inserted with `source='ai'`. Unknown chapterClientId values abort the transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommitInput' }
      responses:
        '200':
          description: Inserted ids
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommitOutput' }

  /admin/comp-subscription:
    post:
      tags: [Admin]
      summary: Grant a complimentary subscription
      description: Admin-only. Creates a `user_subscriptions` row with `plan='comp'`. Optional expiry via `expires_at`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompGrantInput' }
      responses:
        '200':
          description: Echo + post-mutation AI-access state
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: integer, format: int64 }
                  aiAccess: { type: boolean }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Admin]
      summary: Revoke a complimentary subscription
      description: Admin-only. Removes the `user_subscriptions` comp row.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompRevokeInput' }
      responses:
        '200':
          description: Echo + post-mutation AI-access state
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId: { type: integer, format: int64 }
                  aiAccess: { type: boolean }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/BadRequest' }

  /exams:
    post:
      tags: [Exams]
      summary: Create an exam
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExamInput' }
      responses:
        '201':
          description: The created exam
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exam' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Active-exam cap reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    get:
      tags: [Exams]
      summary: List exams
      responses:
        '200':
          description: Exams ordered by exam date ascending
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Exam' }

  /exams/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Exams]
      summary: Read one exam
      responses:
        '200':
          description: The exam
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exam' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Exams]
      summary: Update exam
      description: |
        SubjectID is immutable post-create. Pass the existing value.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExamInput' }
      responses:
        '200':
          description: The updated exam
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exam' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Exams]
      summary: Delete exam (cascades plan + progress)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /exams/{id}/generate-plan:
    post:
      tags: [RevisionPlan]
      summary: Generate (or regenerate) the revision plan for an exam
      description: |
        SSE endpoint. Streams phase events: `shortlist`, `ranking`, `planning`, `done`, `error`.
        Each event's data payload mirrors the orchestrator's Event shape (`{phase, detail?, plan?, error?}`).
        Costs 1 `plan` quota unit; debits annales PDF pages against `pdf.pagesUsed` when an annales is attached.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: text/event-stream of phase events
          content:
            text/event-stream:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403':
          description: Missing AI subscription or wrong owner
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429':
          description: Plan quota exhausted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /exams/{id}/plan:
    get:
      tags: [RevisionPlan]
      summary: Read the persisted plan + today's bucket + drift
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Plan view
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanView' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /exams/{id}/mark-done:
    post:
      tags: [RevisionPlan]
      summary: Mark a flashcard as completed in today's plan
      description: Idempotent — duplicate calls for the same (user, fc, day) are silently ignored.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [flashcardId]
              properties:
                flashcardId: { type: integer, format: int64 }
      responses:
        '204': { description: Recorded }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Billing (Spec C) ───────────────────────────────────────────────────────

  /billing/plans:
    get:
      tags: [Billing]
      summary: List available plans
      description: Public endpoint. Returns pricing tiles for all purchasable plans.
      security: []
      responses:
        '200':
          description: Plan tiles
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PlanTile' }

  /billing/subscription:
    get:
      tags: [Billing]
      summary: Get current subscription state
      description: Returns the caller's live subscription snapshot from Stripe (or local DB if Stripe is unreachable).
      responses:
        '200':
          description: Subscription state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /billing/checkout:
    post:
      tags: [Billing]
      summary: Create a Stripe Checkout session
      description: |
        Returns a one-time `url` to redirect the user to. After payment, Stripe redirects back to `APP_URL/billing/success`.

        Error codes:
        - `already_subscribed` (409) — user already has an active or trialing subscription.
        - `unknown_plan` (422) — `plan` value is not recognised.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [pro_monthly, pro_annual]
      responses:
        '200':
          description: Checkout redirect URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/BadRequest' }

  /billing/portal:
    post:
      tags: [Billing]
      summary: Create a Stripe Customer Portal session
      description: |
        Returns a one-time `url` for the Stripe billing portal where the user can manage or cancel their subscription.

        Error codes:
        - `no_customer` (404) — user has never started a checkout; no Stripe customer exists yet.
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Portal redirect URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /billing/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook receiver
      description: |
        Receives signed Stripe events. The `Stripe-Signature` header is required and verified against `STRIPE_WEBHOOK_SECRET`.

        This endpoint is **not** protected by JWT — Stripe calls it directly.

        Returns 400 if signature verification fails or the event is from the wrong livemode.
      security: []
      parameters:
        - in: header
          name: Stripe-Signature
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe event JSON (do not modify before forwarding)
      responses:
        '200':
          description: Event acknowledged
        '400': { $ref: '#/components/responses/BadRequest' }

  /billing/refresh:
    post:
      tags: [Billing]
      summary: Force-refresh subscription from Stripe
      description: |
        Pulls the latest subscription state from Stripe, writes it to the local DB, and returns the refreshed snapshot.
        Rate-limited to prevent abuse (returns 429 if called too frequently within the same window).
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Refreshed subscription state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing/invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but not authorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            field: { type: string }

    TokenResponse:
      type: object
      properties:
        token: { type: string }

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginInput:
      type: object
      required: [identifier, password]
      properties:
        identifier: { type: string, description: username or email }
        password: { type: string }

    Subject:
      type: object
      properties:
        id: { type: integer, format: int64 }
        owner_id: { type: integer, format: int64 }
        name: { type: string }
        color: { type: string }
        icon: { type: string }
        tags: { type: string }
        visibility: { type: string, enum: [private, friends, public] }
        archived: { type: boolean }
        description: { type: string }
        last_used: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SubjectCreateInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        color: { type: string }
        icon: { type: string }
        tags: { type: string }
        visibility: { type: string, enum: [private, friends, public] }
        description: { type: string }

    SubjectUpdateInput:
      type: object
      properties:
        name: { type: string, nullable: true }
        color: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        tags: { type: string, nullable: true }
        visibility: { type: string, enum: [private, friends, public], nullable: true }
        archived: { type: boolean, nullable: true }
        description: { type: string, nullable: true }

    Chapter:
      type: object
      properties:
        id: { type: integer, format: int64 }
        subject_id: { type: integer, format: int64 }
        title: { type: string }
        position: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Flashcard:
      type: object
      properties:
        id: { type: integer, format: int64 }
        subject_id: { type: integer, format: int64 }
        chapter_id: { type: integer, format: int64, nullable: true }
        title: { type: string }
        question: { type: string }
        answer: { type: string }
        image_id: { type: string, nullable: true }
        source: { type: string, enum: [manual, ai] }
        due_at: { type: string, format: date-time, nullable: true }
        last_result: { type: integer, enum: [-1, 0, 1, 2] }
        last_used: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FlashcardCreateInput:
      type: object
      required: [subject_id, question, answer]
      properties:
        subject_id: { type: integer, format: int64 }
        chapter_id: { type: integer, format: int64, nullable: true }
        title: { type: string }
        question: { type: string }
        answer: { type: string }
        image_id: { type: string, nullable: true }
        source: { type: string, enum: [manual, ai] }

    FlashcardUpdateInput:
      type: object
      properties:
        chapter_id: { type: integer, format: int64, nullable: true }
        title: { type: string, nullable: true }
        question: { type: string, nullable: true }
        answer: { type: string, nullable: true }
        image_id: { type: string, nullable: true }

    FlashcardHit:
      type: object
      properties:
        id: { type: integer, format: int64 }
        subject_id: { type: integer, format: int64 }
        chapter_id: { type: integer, format: int64, nullable: true }
        title: { type: string }
        question: { type: string }

    Friendship:
      type: object
      properties:
        id: { type: integer, format: int64 }
        sender_id: { type: integer, format: int64 }
        receiver_id: { type: integer, format: int64 }
        status: { type: string, enum: [pending, accepted, declined] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Collaborator:
      type: object
      properties:
        id: { type: integer, format: int64 }
        subject_id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        role: { type: string, enum: [viewer, editor] }
        created_at: { type: string, format: date-time }

    InviteLink:
      type: object
      properties:
        token: { type: string }
        subject_id: { type: integer, format: int64 }
        role: { type: string, enum: [viewer, editor] }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Prefs:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        ai_planning_enabled: { type: boolean }
        daily_goal_target: { type: integer }

    Streak:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        current_streak: { type: integer }
        longest_streak: { type: integer }
        last_day: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }

    DailyGoal:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        day: { type: string, format: date-time }
        done_today: { type: integer }
        target: { type: integer }

    TrainingSession:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        subject_id: { type: integer, format: int64 }
        card_count: { type: integer }
        duration_ms: { type: integer }
        score: { type: integer }
        created_at: { type: string, format: date-time }

    Achievement:
      type: object
      properties:
        code: { type: string }
        title: { type: string }
        description: { type: string }
        unlocked_at: { type: string, format: date-time, nullable: true }

    Image:
      type: object
      properties:
        id: { type: string }
        url: { type: string }

    AggregateStats:
      type: object
      description: camelCase stats from GET /get-user-stats
      properties:
        masteryPercent: { type: number, format: float }
        cardsStudied: { type: integer }
        totalCards: { type: integer }
        goodCount: { type: integer }
        okCount: { type: integer }
        badCount: { type: integer }
        newCount: { type: integer }
        badgesUnlocked: { type: integer }
        badgesTotal: { type: integer }

    SubjectStats:
      type: object
      description: camelCase card-difficulty distribution for a single subject
      properties:
        totalCards: { type: integer }
        goodCount: { type: integer }
        okCount: { type: integer }
        badCount: { type: integer }
        newCount: { type: integer }
        cardsStudied: { type: integer }
        masteryPercent: { type: number, format: float }

    ChapterStats:
      type: object
      description: camelCase card-difficulty distribution for a single chapter
      properties:
        totalCards: { type: integer }
        goodCount: { type: integer }
        okCount: { type: integer }
        badCount: { type: integer }
        newCount: { type: integer }
        cardsStudied: { type: integer }
        masteryPercent: { type: number, format: float }

    QuotaBucket:
      type: object
      properties:
        used: { type: integer }
        limit: { type: integer }
        resetAt: { type: string, format: date-time }

    PDFBucket:
      type: object
      properties:
        used: { type: integer }
        limit: { type: integer }
        pagesUsed: { type: integer }
        pagesLimit: { type: integer }
        resetAt: { type: string, format: date-time }

    QuotaSnapshot:
      type: object
      properties:
        aiAccess: { type: boolean }
        prompt: { $ref: '#/components/schemas/QuotaBucket' }
        pdf: { $ref: '#/components/schemas/PDFBucket' }
        check: { $ref: '#/components/schemas/QuotaBucket' }

    PromptGenInput:
      type: object
      required: [subject_id, prompt]
      properties:
        subject_id: { type: integer, format: int64 }
        chapter_id: { type: integer, format: int64, description: "Optional. When set, auto-chapters is suppressed." }
        prompt: { type: string, maxLength: 8000 }
        style: { type: string, enum: [short, standard, detailed], default: standard }
        coverage: { type: string, enum: [Core, Balanced, Comprehensive], default: Balanced }
        focus: { type: string }
        auto_chapters: { type: boolean, default: false, description: "Propose chapters when chapter_id is unset." }

    CheckInput:
      type: object
      required: [flashcard_id]
      properties:
        flashcard_id: { type: integer, format: int64 }
        draft_question: { type: string, description: "If non-empty, overrides stored question." }
        draft_answer: { type: string, description: "If non-empty, overrides stored answer." }

    CheckFinding:
      type: object
      properties:
        kind: { type: string, enum: [factual, style, typo] }
        text: { type: string }

    CheckSuggestion:
      type: object
      properties:
        title: { type: string }
        question: { type: string }
        answer: { type: string }

    CheckOutput:
      type: object
      properties:
        jobId: { type: integer, format: int64 }
        verdict: { type: string, enum: [ok, minor_issues, major_issues] }
        findings:
          type: array
          items: { $ref: '#/components/schemas/CheckFinding' }
        suggestion: { $ref: '#/components/schemas/CheckSuggestion' }

    CommitChapterIn:
      type: object
      required: [clientId, title]
      properties:
        clientId: { type: string, description: Frontend-generated join key }
        title: { type: string }

    CommitCardIn:
      type: object
      required: [question, answer]
      properties:
        chapterClientId: { type: string, description: "Empty string = loose card" }
        title: { type: string }
        question: { type: string }
        answer: { type: string }

    CommitInput:
      type: object
      required: [subject_id, cards]
      properties:
        job_id: { type: integer, format: int64 }
        subject_id: { type: integer, format: int64 }
        chapters:
          type: array
          items: { $ref: '#/components/schemas/CommitChapterIn' }
        cards:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/CommitCardIn' }

    CommitOutput:
      type: object
      properties:
        subjectId: { type: integer, format: int64 }
        chapterIds:
          type: object
          additionalProperties: { type: integer, format: int64 }
          description: Map of clientId → new chapter id
        cardIds:
          type: array
          items: { type: integer, format: int64 }

    Exam:
      type: object
      properties:
        id:             { type: integer, format: int64 }
        userId:         { type: integer, format: int64 }
        subjectId:      { type: integer, format: int64 }
        title:          { type: string }
        notes:          { type: string }
        examDate:       { type: string, format: date }
        annalesImageId: { type: string, nullable: true }
        createdAt:      { type: string, format: date-time }
        updatedAt:      { type: string, format: date-time }

    ExamInput:
      type: object
      required: [subjectId, title, examDate]
      properties:
        subjectId:      { type: integer, format: int64, description: Immutable after creation }
        title:          { type: string }
        notes:          { type: string }
        examDate:       { type: string, description: "YYYY-MM-DD" }
        annalesImageId: { type: string, nullable: true, description: "Image id from POST /upload-image?purpose=exam_annales" }

    PlanDay:
      type: object
      properties:
        date:                { type: string, format: date }
        primarySubjectCards: { type: array, items: { type: integer, format: int64 } }
        crossSubjectCards:   { type: array, items: { type: integer, format: int64 } }
        deeperDives:         { type: array, items: { type: integer, format: int64 } }

    Plan:
      type: object
      properties:
        id:           { type: integer, format: int64 }
        examId:       { type: integer, format: int64 }
        days:
          type: array
          items: { $ref: '#/components/schemas/PlanDay' }
        model:        { type: string }
        promptHash:   { type: string }
        generatedAt:  { type: string, format: date-time }

    TodayBucket:
      type: object
      properties:
        date:                { type: string, format: date }
        primarySubjectCards: { type: array, items: { type: integer, format: int64 } }
        crossSubjectCards:   { type: array, items: { type: integer, format: int64 } }
        deeperDives:         { type: array, items: { type: integer, format: int64 } }
        done:                { type: array, items: { type: integer, format: int64 } }
        dailyGoalMet:        { type: boolean }

    Drift:
      type: object
      properties:
        daysBehind:         { type: integer }
        shouldSuggestRegen: { type: boolean }

    PlanView:
      type: object
      properties:
        plan:  { $ref: '#/components/schemas/Plan' }
        today: { $ref: '#/components/schemas/TodayBucket' }
        drift: { $ref: '#/components/schemas/Drift' }

    # ── Billing schemas (Spec C) ─────────────────────────────────────────────

    Subscription:
      type: object
      required: [status, cancelAtPeriodEnd, isActive]
      properties:
        status:
          type: string
          enum: [none, trialing, active, past_due, paused, canceled, comped]
        plan:
          type: string
          enum: [pro_monthly, pro_annual, comp]
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        trialEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd: { type: boolean }
        isActive: { type: boolean }

    PlanTile:
      type: object
      required: [plan, priceEur, interval]
      properties:
        plan:
          type: string
          enum: [pro_monthly, pro_annual]
        priceEur: { type: number, format: float }
        interval:
          type: string
          enum: [month, year]
        discountPct: { type: integer }

    CompGrantInput:
      type: object
      required: [user_id, reason]
      properties:
        user_id: { type: integer, format: int64 }
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: "Optional RFC-3339 expiry. Omit for an indefinite grant."
        reason: { type: string }

    CompRevokeInput:
      type: object
      required: [user_id, reason]
      properties:
        user_id: { type: integer, format: int64 }
        reason: { type: string }
